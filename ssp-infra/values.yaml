nameOverride: ""
fullnameOverride: ""

sspReleaseName: ""

global:
  registry:
    existingSecrets: []
    url: https://index.docker.io/v2/
    credentials:
      username: ""
      password: ""
      email: ""
  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 1337
    seccompProfile:
      type: RuntimeDefault
  sso:
    enabled: false
  monitoring:
    prometheusOperator:
      serviceMonitor:
        additionalLabels: {}
        interval: 30s

# ***************************************************  Start of SSP Percona DB Config ***************************************************

db:
  enabled: true
  cluster:
    enabled: false
    size: 3
  pmm:
    enabled: false
    serverHost: percona-pmm-service.monitoring.svc
  pxc:
    crVersion: 1.14.0
    resources:
      requests:
#        memory: 1G
        cpu: 600m
        # ephemeral-storage: 1Gi
      limits:
#        memory: 4G
        cpu: 2000m
        # ephemeral-storage: 1Gi
  operator:
    resources:
#     requests:
#        memory: 1G
#        cpu: 200m
#      limits:
#        memory: 1G
#        cpu: 400m
# Percona: https://github.com/percona/percona-helm-charts/blob/21527d03b072eb232fbd700bd5a9d221c12dc068/charts/pxc-db/README.md
  image:
    pxc:
      repository: percona/percona-xtradb-cluster
      tag: 8.0.36-28.1 
    operator:
      repository: percona/percona-xtradb-cluster-operator
      tag: 1.14.1
    haproxy:
      repository: percona/percona-xtradb-cluster-operator
      tag: 1.14.1-haproxy
    proxysql:
      repository: percona/percona-xtradb-cluster-operator
      tag: 1.14.1-proxysql2.5.5-1.2
    pmm:
      repository: percona/pmm-client
      tag: 2.43.2
    backup:
      repository: percona/percona-xtradb-cluster-operator
      tag: 1.14.1-pxc8.0-backup-pxb8.0.35
    mysqld_exporter:
      repository: prom/mysqld-exporter
      tag: v0.14.0
  imagePullPolicy: IfNotPresent
  existingSecret: ""
  existingSslSecret: ""
  existingSslInternalSecret: ""
  schema:
    name: iamauth
    user: iamauth
    password: ""
  password:
    root: ""
    xtrabackup: ""
    monitor: ""
    clustercheck: ""
    proxyadmin: ""
    pmmserver: ""
    operator: ""


  persistence:
    size: 80Gi

