{{- if .Values.db.enabled -}}
{{- if not .Values.db.pmm.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "db.pxcName.def" . }}-metrics-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "ssp-infra.name" . }}-db-metrics-exporter
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ template "ssp-infra.name" . }}-db-metrics-exporter
      release: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ template "ssp-infra.name" . }}-db-metrics-exporter
        # note: chart version specifically removed from "chart" given the mysqld_exporter image as specified in values.yaml is external
        chart: {{ .Chart.Name }}
        heritage: {{ .Release.Service }}
        release: {{ .Release.Name }}
    spec:
      {{- if .Values.global.registry.existingSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.global.registry.existingSecrets | nindent 6 }}
      {{- else if .Values.global.registry.credentials.username }}
      imagePullSecrets:
      - name: ssp-infra-registrypullsecret
      {{- end }}
      securityContext:
        runAsUser: {{ .Values.global.securityContext.runAsUser }}
        runAsGroup: {{ .Values.global.securityContext.runAsGroup }}
        fsGroup: {{ .Values.global.securityContext.fsGroup }}
      containers:
        - name: {{ include "ssp-infra.name" . }}-db-metrics-exporter
          image: "{{ .Values.db.image.mysqld_exporter.repository }}:{{ .Values.db.image.mysqld_exporter.tag }}"
          imagePullPolicy: {{ .Values.db.imagePullPolicy }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            privileged: false
            seccompProfile:
            {{- toYaml .Values.global.securityContext.seccompProfile | nindent 14 }}
          env:
          - name: MYSQL_HOST
            value: {{ template "db.hostName" . }}
          - name: MYSQL_MONITOR_USER
            value: monitor
          - name: MYSQL_MONITOR_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ template "db.secretName" . }}
                key: monitor
          command:
          - 'sh'
          - '-c'
          - 'DATA_SOURCE_NAME="${MYSQL_MONITOR_USER}:${MYSQL_MONITOR_PASSWORD}@(${MYSQL_HOST}:3306)/" /bin/mysqld_exporter --collect.perf_schema.eventsstatements'
          ports:
          - name: db-metrics
            containerPort: 9104
          livenessProbe:
            httpGet:
              path: /
              port: db-metrics
            initialDelaySeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: db-metrics
            initialDelaySeconds: 5
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 400m
              memory: 1Gi
            requests:
              cpu: 300m
              memory: 300Mi
{{- end -}}
{{- end -}}
