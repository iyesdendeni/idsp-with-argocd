  fluent-bit-filter.conf: |
    [FILTER]
        Name                kubernetes
        Match               ssp_msg.*
        Kube_Tag_Prefix     {{ .Values.filter.kubeTagPrefix }}
        Kube_URL            {{ .Values.filter.kubeURL }}
        Kube_CA_File        {{ .Values.filter.kubeCAFile }}
        Kube_Token_File     {{ .Values.filter.kubeTokenFile }}
        Merge_Log           On
        Keep_Log            Off
        #Merge_Log_Key       ""
        K8S-Logging.Parser  Off
        #K8S-Logging.Exclude On
        #Use_Journal         On
{{- if .Values.global.sso.enabled }}
    [FILTER]
        Name                kubernetes
        Match               sso_ps_log_msg.*
