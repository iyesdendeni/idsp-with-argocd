  fluent-bit-streamer.conf: |
    [STREAM_TASK]
        Name   ssp_log
        Exec   CREATE STREAM ssp_log WITH (tag='ssp_log') AS SELECT * from TAG:'ssp_msg.*' WHERE type = 'log';
    [STREAM_TASK]
        Name   ssp_audit
        Exec   CREATE STREAM ssp_audit WITH (tag='ssp_audit') AS SELECT * from TAG:'ssp_msg.*' WHERE type = 'audit';
    [STREAM_TASK]
        Name   ssp_tp_log
        Exec   CREATE STREAM ssp_tp_log WITH (tag='ssp_tp_log') AS SELECT * from TAG:'ssp_msg.*' WHERE NOT @record.contains(type);
{{- if .Values.analytics.enabled }}
    [STREAM_TASK]
        Name   ssp_audit_siddhi
        Exec   CREATE STREAM ssp_audit_siddhi WITH (tag='ssp_audit_siddhi') AS SELECT * from TAG:'ssp_msg.*' WHERE type = 'audit' AND eventId = 'auth-mgr.auth.success';
{{- end }}
{{- if .Values.global.sso.enabled }}
    [STREAM_TASK]
        Name   sso_ps_log
        Exec   CREATE STREAM sso_ps_log WITH (tag='sso_ps_log') AS SELECT * from TAG:'sso_ps_log_msg.*';
    [STREAM_TASK]
        Name   sso_ps_trace
        Exec   CREATE STREAM sso_ps_trace WITH (tag='sso_ps_trace') AS SELECT * from TAG:'sso_ps_trace_msg.*';
    [STREAM_TASK]
        Name   sso_adminps_log
        Exec   CREATE STREAM sso_adminps_log WITH (tag='sso_adminps_log') AS SELECT * from TAG:'sso_adminps_log_msg.*';
    [STREAM_TASK]
        Name   sso_adminps_trace
        Exec   CREATE STREAM sso_adminps_trace WITH (tag='sso_adminps_trace') AS SELECT * from TAG:'sso_adminps_trace_msg.*';
    [STREAM_TASK]
        Name   sso_adminui_log
        Exec   CREATE STREAM sso_adminui_log WITH (tag='sso_adminui_log') AS SELECT * from TAG:'sso_adminui_log_msg.*';
    [STREAM_TASK]
        Name   sso_ps_access
        Exec   CREATE STREAM sso_ps_access WITH (tag='sso_ps_access') AS SELECT * from TAG:'sso_ps_access_msg.*';
    [STREAM_TASK]
        Name   sso_adminps_access
        Exec   CREATE STREAM sso_adminps_access WITH (tag='sso_adminps_access') AS SELECT * from TAG:'sso_adminps_access_msg.*';
    [STREAM_TASK]
        Name   sso_agsrv_log
        Exec   CREATE STREAM sso_agsrv_log WITH (tag='sso_agsrv_log') AS SELECT * from TAG:'sso_ag_srv_log_msg.*';
    [STREAM_TASK]
        Name   sso_agsps_log
        Exec   CREATE STREAM sso_agsps_log WITH (tag='sso_agsps_log') AS SELECT * from TAG:'sso_ag_sps_log_msg.*';
    [STREAM_TASK]
        Name   sso_ag_fwstrace_log
        Exec   CREATE STREAM sso_ag_fwstrace_log WITH (tag='sso_ag_fwstrace_log') AS SELECT * from TAG:'sso_ag_fwstrace_log_msg.*';
    [STREAM_TASK]
        Name   sso_ag_affwebserv_log
        Exec   CREATE STREAM sso_ag_affwebserv_log WITH (tag='sso_ag_affwebserv_log') AS SELECT * from TAG:'sso_ag_affwebserv_log_msg.*';

{{- end }}

  fluent-bit.conf: |
    @INCLUDE fluent-bit-service.conf
    @INCLUDE fluent-bit-input.conf
    @INCLUDE fluent-bit-filter.conf
    @INCLUDE fluent-bit-output.conf

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Keep   off
        Time_Key    time
        # TBD: update to use log entry's timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Decode_Field_As escaped log
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

{{- end -}}
