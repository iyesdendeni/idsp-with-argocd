{{- if index .Values "fluent-bit" "enabled" -}}
{{- $foundDepricatedCM := ( include "exists.deprecated.fluentbit.configmap" . ) }}
{{ if eq $foundDepricatedCM "true" }}
#continue to use the old config map only if there is an old (deprecated) fluent-bit configmap already
#(determined by checking the cmversion annotation, $foundDepricatedCM = {{$foundDepricatedCM}}))
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ index .Values "fluent-bit" "existingConfigMap" }}
  labels:
    app: {{ template "ssp-infra.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
data:
  fluent-bit-service.conf: |
    [SERVICE]
        Flush        {{ .Values.sspfbService.flush }}
        Daemon       Off
        Log_Level    {{ .Values.sspfbService.logLevel }}
        Parsers_File parsers.conf
        Streams_File fluent-bit-streamer.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    {{ index .Values "fluent-bit"  "service" "port" }}
        Health_Check On

  fluent-bit-input.conf: |
{{- if .Values.sspfbService.ingressLogsIncluded }}
    [INPUT]
        Name             tail
        Tag              ssp_msg.*
        Path             /var/log/containers/ingress-nginx-controller-*.log
        Parser           docker
        Refresh_Interval 5
        Mem_Buf_Limit    20M
        Buffer_Max_Size  1M
        Buffer_Chunk_Size 128k
        Skip_Long_Lines  On
{{- end }}
    [INPUT]
        Name             tail
        Tag              ssp_msg.*
        Path             /var/log/containers/{{ required "***** A valid sspReleaseName value required in values.yaml or passed in via --set sspReleaseName=<value>!  If this is an upgrade, specify --reuse-values. *****" .Values.sspReleaseName }}-ssp-*.log
        Parser           {{ .Values.sspfbService.parser }}
        Refresh_Interval 5
        Mem_Buf_Limit    {{ .Values.input.tail.memBufLimit }}
        Buffer_Max_Size  1M
        Buffer_Chunk_Size 128k
        Skip_Long_Lines  On
{{- if .Values.input.tail.ignore_older }}
        Ignore_Older    {{ .Values.input.tail.ignore_older }}
{{- end }}
{{- if .Values.input.tail.preserveLastProcessedLine.enabled }}
        DB               /var/log/tail-containers-state-{{.Values.sspReleaseName }}-ssp.db
        DB.Sync          Normal
{{- end }}
{{- if .Values.global.sso.enabled }}
    [INPUT]
        Name              tail
        Tag               sso_ps_log_msg.*
        Path              /var/log/containers/{{ required "***** A valid ssoReleaseName value required in values.yaml or passed in via --set ssoReleaseName=<value>!  If this is an upgrade, specify --reuse-values. *****" .Values.ssoReleaseName }}-siteminder-policy-server-*_*_policy-server-log*.log
        Parser            {{ .Values.sspfbService.parser }}
        Refresh_Interval 5
        Mem_Buf_Limit    {{ .Values.input.tail.memBufLimit }}
        Buffer_Max_Size  1M
        Buffer_Chunk_Size 128k
        Skip_Long_Lines  On
{{- if .Values.input.tail.ignore_older }}
        Ignore_Older      {{ .Values.input.tail.ignore_older }}
{{- end }}
{{- if .Values.input.tail.preserveLastProcessedLine.enabled }}
        DB               /var/log/tail-containers-state-{{.Values.ssoReleaseName }}-sso.db
