{{- if .Values.input.tail.preserveLastProcessedLine.enabled }}
        DB               /var/log/tail-containers-state-{{.Values.ssoReleaseName }}-sso.db
        DB.Sync          Normal
{{- end }}
    [INPUT]
        Name              tail
        Tag               sso_adminui_msg.*
        Path              /var/log/containers/{{ required "***** A valid ssoReleaseName value required in values.yaml or passed in via --set ssoReleaseName=<value>!  If this is an upgrade, specify --reuse-values. *****" .Values.ssoReleaseName }}-siteminder-admin-*_*_admin-ui-*.log
