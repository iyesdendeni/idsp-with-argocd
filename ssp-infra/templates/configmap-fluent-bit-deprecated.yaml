        Parser            {{ .Values.sspfbService.parser }}
        Mem_Buf_Limit     {{ .Values.input.tail.memBufLimit }}
        Buffer_Max_Size   1M
        Buffer_Chunk_Size 128k
        Skip_Long_Lines   On
        Refresh_Interval  5
{{- if .Values.input.tail.ignore_older }}
        Ignore_Older      {{ .Values.input.tail.ignore_older }}
