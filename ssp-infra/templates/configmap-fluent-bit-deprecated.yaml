  fluent-bit-output.conf: |
{{- if .Values.analytics.enabled }}
    [OUTPUT]
      Name  http
      Match ssp_audit_siddhi
      Host {{ .Values.analytics.siddhi.host }}
      Port {{ .Values.analytics.siddhi.port }}
      URI {{ .Values.analytics.siddhi.uri }}
      Format json
{{- end }}
{{- if eq .Values.backend.type "test" }}
    [OUTPUT]
        Name  file
        Match *
        Path /tmp/fluent-bit.log
{{- else if eq .Values.backend.type "forward" }}
    [OUTPUT]
        Name          forward
        Match         *
        Host          {{ .Values.backend.forward.host }}
        Port          {{ .Values.backend.forward.port }}
        Retry_Limit False
{{- if .Values.backend.forward.shared_key }}
        Shared_Key    {{ .Values.backend.forward.shared_key }}
{{- end }}
{{- if .Values.backend.forward.tls }}
        tls           {{ .Values.backend.forward.tls }}
{{- end }}
{{- if .Values.backend.forward.tls_verify }}
        tls.verify    {{ .Values.backend.forward.tls_verify }}
{{- end }}
{{- if .Values.backend.forward.tls_debug }}
        tls.debug     {{ .Values.backend.forward.tls_debug }}
{{- end }}
{{ else if eq .Values.backend.type "es" }}
    [OUTPUT]
        Name  es
        Match ssp_log
        Host  {{ .Values.backend.es.host }}
        Port  {{ .Values.backend.es.port }}
        tls   {{ .Values.backend.es.tls }}
        tls.verify {{ .Values.backend.es.tls_verify }}
        {{- if .Values.backend.es.tls_ca_file }}
        tls.ca_file {{ .Values.backend.es.tls_ca_file }}
        {{- end }}
        Suppress_Type_Name On
        #Type  _doc
        #Logstash_Format "On"
        #Retry_Limit {{ .Values.backend.es.retry_limit }}
        #Time_Key "@timestamp"
        Replace_Dots  On
        #Logstash_Prefix ssp_log
        #Logstash_Prefix_Key ssp_log
        Index ssp_log
{{- if .Values.backend.es.http_user }}
        HTTP_User {{ .Values.backend.es.http_user }}
{{- if .Values.backend.es.http_passwd }}
        HTTP_Passwd {{ .Values.backend.es.http_passwd }}
{{- else }}
        HTTP_Passwd ${HTTP_PASSWORD}
{{- end }}
{{- end }}

    [OUTPUT]
        Name  es
        Match ssp_audit
        Host  {{ .Values.backend.es.host }}
        Port  {{ .Values.backend.es.port }}
        tls   {{ .Values.backend.es.tls }}
        tls.verify {{ .Values.backend.es.tls_verify }}
        {{- if .Values.backend.es.tls_ca_file }}
        tls.ca_file {{ .Values.backend.es.tls_ca_file }}
        {{- end }}
        Suppress_Type_Name On
        #Type  _doc
        #Logstash_Format "On"
        #Retry_Limit {{ .Values.backend.es.retry_limit }}
        #Time_Key "@timestamp"
        Replace_Dots  On
        #Logstash_Prefix ssp_audit
        #Logstash_Prefix_Key ssp_audit
        Index ssp_audit
{{- if .Values.backend.es.http_user }}
        HTTP_User {{ .Values.backend.es.http_user }}
{{- if .Values.backend.es.http_passwd }}
        HTTP_Passwd {{ .Values.backend.es.http_passwd }}
{{- else }}
        HTTP_Passwd ${HTTP_PASSWORD}
{{- end }}
{{- end }}

    [OUTPUT]
        Name  es
        Match ssp_tp_log
        Host  {{ .Values.backend.es.host }}
        Port  {{ .Values.backend.es.port }}
        tls   {{ .Values.backend.es.tls }}
        tls.verify {{ .Values.backend.es.tls_verify }}
        {{- if .Values.backend.es.tls_ca_file }}
        tls.ca_file {{ .Values.backend.es.tls_ca_file }}
        {{- end }}
        Suppress_Type_Name On
        #Type  _doc
        #Logstash_Format "On"
        #Retry_Limit {{ .Values.backend.es.retry_limit }}
        #Time_Key "@timestamp"
        Replace_Dots  On
        #Logstash_Prefix ssp_tp_log
        #Logstash_Prefix_Key ssp_tp_log
        Index ssp_tp_log
{{- if .Values.backend.es.http_user }}
        HTTP_User {{ .Values.backend.es.http_user }}
{{- if .Values.backend.es.http_passwd }}
        HTTP_Passwd {{ .Values.backend.es.http_passwd }}
{{- else }}
        HTTP_Passwd ${HTTP_PASSWORD}
{{- end }}
{{- end }}

{{- if .Values.global.sso.enabled }}
    [OUTPUT]
        Name  es
        Match sso_ps_log
        Host  {{ .Values.backend.es.host }}
        Port  {{ .Values.backend.es.port }}
        tls   {{ .Values.backend.es.tls }}
        tls.verify {{ .Values.backend.es.tls_verify }}
        {{- if .Values.backend.es.tls_ca_file }}
        tls.ca_file {{ .Values.backend.es.tls_ca_file }}
        {{- end }}
        Suppress_Type_Name On
        #Type  _doc
        #Logstash_Format "On"
        #Retry_Limit {{ .Values.backend.es.retry_limit }}
        #Time_Key "@timestamp"
        Replace_Dots  On
        #Logstash_Prefix sso_log
        #Logstash_Prefix_Key sso_log
        Index sso_ps_log
{{- if .Values.backend.es.http_user }}
        HTTP_User {{ .Values.backend.es.http_user }}
{{- if .Values.backend.es.http_passwd }}
        HTTP_Passwd {{ .Values.backend.es.http_passwd }}
{{- else }}
        HTTP_Passwd ${HTTP_PASSWORD}
{{- end }}
{{- end }}

    [OUTPUT]
        Name  es
        Match sso_ps_trace
        Host  {{ .Values.backend.es.host }}
        Port  {{ .Values.backend.es.port }}
        tls   {{ .Values.backend.es.tls }}
        tls.verify {{ .Values.backend.es.tls_verify }}
        {{- if .Values.backend.es.tls_ca_file }}
        tls.ca_file {{ .Values.backend.es.tls_ca_file }}
        {{- end }}
        Suppress_Type_Name On
        #Type  _doc
        #Logstash_Format "On"
        #Retry_Limit {{ .Values.backend.es.retry_limit }}
        #Time_Key "@timestamp"
        Replace_Dots  On
        #Logstash_Prefix sso_log
        #Logstash_Prefix_Key sso_log
        Index sso_ps_trace
{{- if .Values.backend.es.http_user }}
        HTTP_User {{ .Values.backend.es.http_user }}
{{- if .Values.backend.es.http_passwd }}
        HTTP_Passwd {{ .Values.backend.es.http_passwd }}
{{- else }}
        HTTP_Passwd ${HTTP_PASSWORD}
{{- end }}
{{- end }}

    [OUTPUT]
