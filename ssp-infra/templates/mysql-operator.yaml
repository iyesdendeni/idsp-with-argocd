{{- if .Values.db.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "ssp-infra.fullname" . }}-percona-xtradb-cluster-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      name: {{ template "ssp-infra.fullname" . }}-percona-xtradb-cluster-operator
  template:
    metadata:
      labels:
        name: {{ template "ssp-infra.fullname" . }}-percona-xtradb-cluster-operator
    spec:
      serviceAccountName: {{ template "ssp-infra.fullname" . }}-percona-xtradb-cluster-operator
      {{- if .Values.global.registry.existingSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.global.registry.existingSecrets | nindent 6 }}
      {{- else if .Values.global.registry.credentials.username }}
      imagePullSecrets:
      - name: ssp-infra-registrypullsecret
      {{- end }}
      containers:
      - name: percona-xtradb-cluster-operator
        image: "{{ .Values.db.image.operator.repository }}:{{ .Values.db.image.operator.tag }}"
        imagePullPolicy: {{ .Values.db.imagePullPolicy }}
        ports:
        - containerPort: 60000
          name: metrics
        command:
        - percona-xtradb-cluster-operator
        resources:
          {{- toYaml .Values.db.operator.resources | nindent 10 }}
        env:
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_NAME
          value: "{{ template "ssp-infra.fullname" . }}-percona-xtradb-cluster-operator"

{{- end -}}
