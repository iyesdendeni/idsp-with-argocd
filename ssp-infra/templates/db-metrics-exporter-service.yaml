{{- if .Values.db.enabled -}}
{{- if not .Values.db.pmm.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "db.pxcName.def" . }}-metrics-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "ssp-infra.name" . }}-db-metrics-exporter
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_"}}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
    ssp-infra-prometheus-metrics: db-metrics
spec:
  type: ClusterIP
  ports:
    - name: db-metrics
      port: 9104
      targetPort: db-metrics
  selector:
    app: {{ template "ssp-infra.name" . }}-db-metrics-exporter
    release: {{ .Release.Name }}
{{- end -}}
{{- end -}}
