---
# Source: ssp-infra/templates/configmap-fluent-bit.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ssp-infra-config
  namespace: ssp
  labels:
    app: ssp-infra
    chart: ssp-infra-1.0.3228
    heritage: Helm
    release: ssp-infra
data:
  fluent-bit-service.conf: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info
        Parsers_File parsers.conf
        Streams_File fluent-bit-streamer.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020
        Health_Check On

  fluent-bit-input.conf: |
    [INPUT]
        Name             tail
        Path             /var/log/containers/ssp-ssp-*.log
        Parser           docker
        Tag              ssp_msg.*
        Refresh_Interval 5
        Mem_Buf_Limit    5MB
        Skip_Long_Lines  Off
        DB               /var/log/tail-containers-state-ssp-ssp.db
        DB.Sync          Normal

  fluent-bit-filter.conf: |
    [FILTER]
        Name                kubernetes
        Match               ssp_msg.*
        Kube_Tag_Prefix     ssp_msg.var.log.containers.
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        #Merge_Log_Key       ""
        K8S-Logging.Parser  Off
        #K8S-Logging.Exclude On
        #Use_Journal         On


  fluent-bit-output.conf: |
    [OUTPUT]
        Name  es
        Match ssp_log
        Host  elasticsearch-master.logging.svc
        Port  9200
        tls   off
        tls.verify on
        Suppress_Type_Name On
        #Type  _doc
        #Logstash_Format "On"
        #Retry_Limit False
        #Time_Key "@timestamp"
        Replace_Dots  On
        #Logstash_Prefix ssp_log
        #Logstash_Prefix_Key ssp_log
        Index ssp_log
        HTTP_User elastic
        HTTP_Passwd changeme

    [OUTPUT]
        Name  es
        Match ssp_audit
        Host  elasticsearch-master.logging.svc
        Port  9200
        tls   off
        tls.verify on
        Suppress_Type_Name On
        #Type  _doc
        #Logstash_Format "On"
        #Retry_Limit False
        #Time_Key "@timestamp"
        Replace_Dots  On
        #Logstash_Prefix ssp_audit
        #Logstash_Prefix_Key ssp_audit
        Index ssp_audit
        HTTP_User elastic
        HTTP_Passwd changeme

    [OUTPUT]
        Name  es
        Match ssp_tp_log
        Host  elasticsearch-master.logging.svc
        Port  9200
        tls   off
        tls.verify on
        Suppress_Type_Name On
        #Type  _doc
        #Logstash_Format "On"
        #Retry_Limit False
        #Time_Key "@timestamp"
        Replace_Dots  On
        #Logstash_Prefix ssp_tp_log
        #Logstash_Prefix_Key ssp_tp_log
        Index ssp_tp_log
        HTTP_User elastic
        HTTP_Passwd changeme



  fluent-bit-streamer.conf: |
    [STREAM_TASK]
        Name   ssp_log
        Exec   CREATE STREAM ssp_log WITH (tag='ssp_log') AS SELECT * from TAG:'ssp_msg.*' WHERE type = 'log';
    [STREAM_TASK]
        Name   ssp_audit
        Exec   CREATE STREAM ssp_audit WITH (tag='ssp_audit') AS SELECT * from TAG:'ssp_msg.*' WHERE type = 'audit';
    [STREAM_TASK]
        Name   ssp_tp_log
        Exec   CREATE STREAM ssp_tp_log WITH (tag='ssp_tp_log') AS SELECT * from TAG:'ssp_msg.*' WHERE NOT @record.contains(type);

  fluent-bit.conf: |
    @INCLUDE fluent-bit-service.conf
    @INCLUDE fluent-bit-input.conf
    @INCLUDE fluent-bit-filter.conf
    @INCLUDE fluent-bit-output.conf

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Keep   off
        Time_Key    time
        # TBD: update to use log entry's timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Decode_Field_As escaped log
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
