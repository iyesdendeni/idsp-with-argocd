#USER-SUPPLIED VALUES: null
# Images: us.gcr.io/saasdev-sed-ssp-hp/maint/<component>:<tag> (chart 4.0.2: ssp-router tag 4.1.0.1283)
#
# ssp-router imagePullSecrets come ONLY from ssp.global.ssp.registry.existingSecrets (see chart ssprouter-deployment.yaml).
# Root global.imagePullSecrets below does NOT affect the router; it can help other charts/subcharts.
# If pulls fail with 403 / not found: fix ssp-staging-registrypullsecret (GCP SA JSON key with pull access to
# project saasdev-sed-ssp-hp on us.gcr.io). See docs/gcr-ssprouter-image-pull.md
global:
  imagePullSecrets:
    - name: ssp-staging-registrypullsecret
  ssp:
    registry:
      existingSecrets:
        - name: ssp-staging-registrypullsecret
hazelcast-enterprise:
  cluster:
    memberCount: 2
  image:
    pullSecrets:
    - ssp-staging-registrypullsecret
ssp:
  deployment:
    size: demo
  featureFlags:
    dataseed:
      enabled: true
    mcpserver:
      enabled: true
    multiidstore:
      enabled: true
  global:
    drSite: false
    # Required when changing ssp.ingress.host after DB was seeded with a different FQDN (dataseed fatal otherwise).
    # After dataseed succeeds, you may set back to false if Broadcom docs allow.
    forceIngressHostOverride: true
    ssp:
      registry:
        imageRepositoryBase: us.gcr.io/saasdev-sed-ssp-hp/maint/
        existingSecrets:
          - name: ssp-staging-registrypullsecret
  db:
    serviceHost: ssp-ssp-db-pxc
    servicePort: 3306
  ingress:
    host: ssp-envoy.id-broadcom.com
    tls:
#      secretName: ssp-general-tls
#      wildcardTls:
      generateSelfSignedCert: true
    type: gatewayapi
    # Chart reads ssp.ingress.gatewayApi.* (ssprouter-gateway.yaml, _helpers.tpl)
    gatewayApi:
      gatewayClassName: envoy-gateway-class
      createGateway: true
      # GKE Gateway (ssp-gw) can use false; Envoy Gateway still needs TLS to ssp-router
      # on :8095. With false, apply BackendTLSPolicy + CA ConfigMap from manifests
      # (see docs/envoy-gateway-ssp-router-upstream-tls.md). Chart-generated policy may
      # use a hostname that does not match the router cert SAN (*.ssp-envoy.svc).
      createBackendTLSPolicy: false
