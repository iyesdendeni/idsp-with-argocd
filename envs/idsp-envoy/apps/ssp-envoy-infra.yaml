apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ssp-envoy-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  destination:
    namespace: ssp-envoy
    server: https://kubernetes.default.svc
  project: default
  sources:
#    - repoURL: https://github.com/iyesdendeni/idsp-with-argocd.git
#      targetRevision: main
#      path: envs/idsp-envoy/manifests
    - chart: ssp-infra
      repoURL: https://ssp-helm-charts-staging.storage.googleapis.com/ssp-maint-patch
      targetRevision: 4.0.2-1034.stage
      helm:
        valueFiles: 
        - $values/envs/idsp-envoy/values/ssp-infra-envoy-values.yaml
    - repoURL: https://github.com/iyesdendeni/idsp-with-argocd.git
      targetRevision: main
      ref: values
  syncPolicy:
    manual:
      prune: true
      selfHeal: true
    syncOptions:
        - CreateNamespace=true