#USER-SUPPLIED VALUES: null
hazelcast-enterprise:
  cluster:
    memberCount: 2
  image:
    pullSecrets:
    - ssp-staging-registrypullsecret
ssp:
  deployment:
    size: demo
  featureFlags:
    dataseed:
      enabled: true
    mcpserver:
      enabled: true
    multiidstore:
      enabled: true
  global:
    drSite: false
    ssp:
      registry:
        existingSecrets:
        - name: ssp-staging-registrypullsecret
  ingress:
    host: ssp.id-broadcom.com
    ingressClassName: nginx
    tls:
      secretName: ssp-general-tls
    type: nginx
  keys:
    mek:
      existingSecret: ssp-mek-secret
  