apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idsp-main
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    directory: 
      recurse: true
    path: envs/idsp-main
    targetRevision: main
    repoURL: https://github.com/iyesdendeni/idsp-with-argocd.git
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m0s
        factor: 2
    syncOptions:
        - CreateNamespace=true
        