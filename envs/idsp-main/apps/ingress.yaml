apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"  
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: ingress
    server: https://kubernetes.default.svc
  project: default
  sources:
    - chart: ingress-nginx
      repoURL: https://kubernetes.github.io/ingress-nginx
      targetRevision: 4.14.0
      helm:
        valueFiles: 
        - $values/envs/idsp-main/values/ingress-values.yaml
    - repoURL: https://github.com/iyesdendeni/idsp-with-argocd.git
      targetRevision: main
      ref: values
  patches:
  - patch: |-
      - op: replace
        path: /spec/ttlSecondsAfterFinished
        value: 10
    target:
      kind: Job
      name: ingress-nginx-admission-create
  - patch: |-
      - op: replace
        path: /spec/ttlSecondsAfterFinished
        value: 10
    target:
      kind: Job
      name: ingress-nginx-admission-patch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
        - CreateNamespace=true