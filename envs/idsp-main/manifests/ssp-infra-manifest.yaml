  containers:
    - name: wget
      image: "busybox:latest"
      imagePullPolicy: Always
      command: ['wget']
      args: ['ssp-infra-fluent-bit:2020']
  imagePullSecrets:
    - name: ssp-staging-registrypullsecret
  restartPolicy: Never
