#USER-SUPPLIED VALUES: null
# Root-level global is what many Helm subcharts (e.g. ssp-router) use for imagePullSecrets
global:
  imagePullSecrets:
    - name: ssp-staging-registrypullsecret
  ssp:
    registry:
      existingSecrets:
        - name: ssp-staging-registrypullsecret
hazelcast-enterprise:
  cluster:
    memberCount: 2
  image:
    pullSecrets:
    - ssp-staging-registrypullsecret
ssp:
  deployment:
    size: demo
  featureFlags:
    dataseed:
      enabled: true
    mcpserver:
      enabled: true
    multiidstore:
      enabled: true
  global:
    drSite: false
    ssp:
      registry:
        existingSecrets:
        - name: ssp-staging-registrypullsecret
  db:
    serviceHost: ssp-ssp-db-pxc
    servicePort: 3306
  ingress:
    host: ssp.id-broadcom.com
    tls:
      secretName: ssp-general-tls
    type: gatewayapi
    # Chart reads ssp.ingress.gatewayApi.* (ssprouter-gateway.yaml, _helpers.tpl)
    gatewayApi:
      gatewayType: gke
      gatewayClassName: gke-l7-global-external-managed
      createGateway: true
      createBackendTLSPolicy: false
