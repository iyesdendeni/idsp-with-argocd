---
# Source: ssp-infra/templates/mysql-operator.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssp-infra-ssp-infra-percona-xtradb-cluster-operator
  namespace: ssp
spec:
  replicas: 1
  selector:
    matchLabels:
      name: ssp-infra-ssp-infra-percona-xtradb-cluster-operator
  template:
    metadata:
      labels:
        name: ssp-infra-ssp-infra-percona-xtradb-cluster-operator
    spec:
      serviceAccountName: ssp-infra-ssp-infra-percona-xtradb-cluster-operator
      imagePullSecrets:
      - name: ssp-staging-registrypullsecret
      containers:
      - name: percona-xtradb-cluster-operator
        image: "percona/percona-xtradb-cluster-operator:1.10.0"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 60000
          name: metrics
        command:
        - percona-xtradb-cluster-operator
        env:
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_NAME
          value: "ssp-infra-ssp-infra-percona-xtradb-cluster-operator"
